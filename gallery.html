<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Deep Talks</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Gallery — Deep Talks" />
  <meta property="og:description" content="Photos from Deep Talks sessions in Canggu, Bali." />
  <meta property="og:url" content="https://deeptalkscanggu.github.io/gallery.html" />
  <meta property="og:image" content="https://deeptalkscanggu.github.io/images/deeptalks-green.webp" />
  <link rel="icon" href="images/favicon.webp" type="image/webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery-hero {
      background: #f2f2f2;
      background-image: none;
      min-height: 200px;
      padding: calc(60px + 2.5rem) 2rem 2.5rem;
      justify-content: center;
      text-align: center;
      align-items: center;
    }
    .page-hero.gallery-hero .page-hero-eyebrow { color: var(--grey-dark); margin-bottom: 0.85rem; }
    .page-hero.gallery-hero h1 { color: var(--grey-dark); }

    @media (max-width: 979px) {
      .page-hero.gallery-hero { min-height: 160px; padding: calc(60px + 2rem) 2rem 2rem; }
    }

    .gallery-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    .gallery-grid {
      columns: 3;
      column-gap: 10px;
    }

    @media (max-width: 800px) { .gallery-grid { columns: 2; } }
    @media (max-width: 480px) { .gallery-grid { columns: 1; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 10px;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .gallery-item:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    .gallery-ig-note {
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--grey-soft);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .gallery-ig-note a { color: var(--green-dark); text-decoration: none; }
    .gallery-ig-note a:hover { text-decoration: underline; }

    .gallery-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--grey-soft);
      font-size: 0.95rem;
    }

    .gallery-pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      padding: 2.5rem 0 1rem;
      flex-wrap: wrap;
    }

    .gallery-pagination button {
      min-width: 2.4rem;
      height: 2.4rem;
      padding: 0 0.6rem;
      border: 1.5px solid var(--green-dark, #2d6a4f);
      background: transparent;
      color: var(--green-dark, #2d6a4f);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .gallery-pagination button:hover { background: var(--green-dark, #2d6a4f); color: #fff; }
    .gallery-pagination button.active { background: var(--green-dark, #2d6a4f); color: #fff; pointer-events: none; }
    .gallery-pagination button:disabled { opacity: 0.35; pointer-events: none; }
    .gallery-pagination .pg-dots { color: var(--grey-soft, #aaa); font-size: 0.9rem; padding: 0 0.2rem; line-height: 2.4rem; }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }
    .lightbox.open { display: flex; }

    .lightbox-img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      display: block;
    }

    .lightbox-close {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: 2.4rem;
      height: 2.4rem;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      color: #fff;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 201;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>

  <nav id="nav-root"></nav>

  <section class="page-hero gallery-hero">
    <p class="page-hero-eyebrow">Deep Talks</p>
    <h1>Gallery</h1>
  </section>

  <div class="gallery-section">
    <p class="gallery-ig-note">View more on <a href="https://www.instagram.com/deeptalkscanggu/" target="_blank" rel="noopener">@deeptalkscanggu ↗</a></p>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&#x2715;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
  </div>

  <script>
    var GALLERY_IMAGES = [
      '017.webp','016.webp','015.webp','014.webp','013.webp',
      '012.webp','011.webp','010.webp','009.webp','008.webp',
      '007.webp','006.webp','005.webp','004.webp','003.webp',
      '002.webp','001.webp'
    ];

    var PAGE_SIZE = 50;
    var currentPage = 0;

    var grid = document.getElementById('gallery-grid');
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var lightboxClose = document.getElementById('lightbox-close');

    function totalPages() {
      return Math.ceil(GALLERY_IMAGES.length / PAGE_SIZE);
    }

    function renderPagination() {
      var old = document.getElementById('gallery-pagination');
      if (old) old.remove();
      if (totalPages() <= 1) return;

      var nav = document.createElement('div');
      nav.className = 'gallery-pagination';
      nav.id = 'gallery-pagination';

      function makeBtn(label, page, isActive) {
        var b = document.createElement('button');
        b.textContent = label;
        if (isActive) b.classList.add('active');
        b.addEventListener('click', function() {
          currentPage = page;
          renderGallery();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        nav.appendChild(b);
      }

      function makeDots() {
        var s = document.createElement('span');
        s.className = 'pg-dots';
        s.textContent = '…';
        nav.appendChild(s);
      }

      var prev = document.createElement('button');
      prev.textContent = '← Prev';
      if (currentPage === 0) prev.disabled = true;
      prev.addEventListener('click', function() {
        currentPage--;
        renderGallery();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      nav.appendChild(prev);

      var total = totalPages();
      var lastDots = false;
      for (var i = 0; i < total; i++) {
        var near = i === 0 || i === total - 1 || Math.abs(i - currentPage) <= 1;
        if (near) {
          makeBtn(i + 1, i, i === currentPage);
          lastDots = false;
        } else if (!lastDots) {
          makeDots();
          lastDots = true;
        }
      }

      var next = document.createElement('button');
      next.textContent = 'Next →';
      if (currentPage >= total - 1) next.disabled = true;
      next.addEventListener('click', function() {
        currentPage++;
        renderGallery();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      nav.appendChild(next);

      grid.parentElement.appendChild(nav);
    }

    function renderGallery() {
      grid.innerHTML = '';

      var start = currentPage * PAGE_SIZE;
      var pageImages = GALLERY_IMAGES.slice(start, start + PAGE_SIZE);

      if (pageImages.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'gallery-empty';
        empty.textContent = 'Photos coming soon.';
        grid.appendChild(empty);
        renderPagination();
        return;
      }

      pageImages.forEach(function(src) {
        var item = document.createElement('div');
        item.className = 'gallery-item';

        var img = document.createElement('img');
        img.src = 'images/gallery/' + src;
        img.alt = '';
        img.loading = 'lazy';

        item.appendChild(img);

        item.addEventListener('click', function() {
          lightboxImg.src = 'images/gallery/' + src;
          lightboxImg.alt = src;
          lightbox.classList.add('open');
          document.body.style.overflow = 'hidden';
        });

        grid.appendChild(item);
      });

      renderPagination();
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
    });

    renderGallery();
  </script>

  <script src="js/components.js"></script>
</body>
</html>
