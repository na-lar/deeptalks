<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Past Topics — Deep Talks</title>
  <link rel="icon" href="images/favicon.webp" type="image/webp" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .topics-header {
      display: grid;
      grid-template-columns: 130px 1fr 1fr;
      gap: 1rem;
      padding: 0.6rem 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-mid);
      border-bottom: 1px solid rgba(200,230,201,0.3);
      margin-top: 2.5rem;
    }
    .past-page-hero {
      background: #f2f2f2;
      background-image: none;
      min-height: auto;
      padding: 4.5rem 2rem 1.5rem;
      margin-top: 2rem;
      justify-content: center;
    }
    .page-hero.past-page-hero .page-hero-eyebrow {
      color: var(--grey-dark);
      margin-bottom: 0.85rem;
    }
    .page-hero.past-page-hero h1 {
      color: var(--grey-dark);
    }
    @media (min-width: 980px) {
      .page-hero.past-page-hero {
        text-align: center;
        align-items: center;
        padding-left: 0;
      }
      .page-hero.past-page-hero .page-hero-eyebrow,
      .page-hero.past-page-hero h1 {
        max-width: 720px;
      }
    }
    @media (max-width: 979px) {
      .page-hero.past-page-hero {
        min-height: auto;
        padding: 3.5rem 2rem 1.5rem;
      }
    }
    .content-section > .btn-outline {
      margin: 1rem 0 1.5rem;
      display: inline-block;
    }
    .topic-row {
      display: grid;
      grid-template-columns: 130px 1fr 1fr;
      gap: 1rem;
      align-items: start;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(200,230,201,0.2);
      transition: background 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .topic-row:hover { background: rgba(200,230,201,0.1); }
    .topic-date {
      font-size: 0.78rem;
      color: var(--green-dark);
      font-variant-numeric: tabular-nums;
      padding-top: 3px;
    }
    .topic-subject {
      font-family: 'Times New Roman', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--grey-dark);
      line-height: 1.3;
    }
    .topic-host {
      font-size: 0.73rem;
      color: var(--green-dark);
      letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .topic-explanation {
      font-size: 0.82rem;
      color: var(--green-dark);
      line-height: 1.6;
    }
.loading-state, .error-state, .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--green-dark);
      font-size: 0.9rem;
    }
    .loading-state .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(200,230,201,0.3);
      border-top-color: var(--green-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    .error-state { color: #e07070; }
    .count-badge {
      font-size: 0.72rem;
      color: var(--green-dark);
      letter-spacing: 0.08em;
      margin-top: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .year-banner {
      background: rgba(140, 195, 158, 1);
      text-align: center;
      color: black;
      padding: 0.5rem 1rem;
      font-size: 1.2rem;
      font-weight: bold;
      margin: 1rem 0;
      border-radius: 4px;
    }
    @media (max-width: 680px) {
      .topics-header { display: none; }
      .topic-row {
        grid-template-columns: 1fr;
        gap: 0.4rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html">
      <img class="header-logo" src="images/deeptalks-logo.webp" alt="Deep Talks logo" />
      Deep Talks
    </a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle" />
    <label for="nav-toggle" class="hamburger">☰</label>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="past-topics.html">Past Topics</a></li>
      <li><a href="https://drive.google.com/drive/folders/1BnhAtuRoxeofDLVrC_gHPiczwu9wM4GD" target="_blank" rel="noopener">Photos & Videos</a></li>
    </ul>
  </nav>

  <section class="page-hero past-page-hero">
    <p class="page-hero-eyebrow">Archive</p>
    <h1>Past Topics</h1>
  </section>

  <div class="content-section" style="max-width: 1000px;">
    <h2>What we've explored</h2>
    <p>Every session begins with a question worth sitting with. Here's where we've been.</p>
       <a class="btn-outline" href="https://docs.google.com/document/d/1xBx8RmBRYwU-6mp3Hej3AbbIZKCic1efqA3sg_OeXQI/" target="_blank" rel="noopener">👉 Past announcement messages</a>
    <p class="count-badge" id="topic-count"></p>

    <div class="topics-header">
      <span>Date</span>
      <span>Subject</span>
      <span>Summary</span>
      <span></span>
    </div>

    <div id="topics-container">
      <div class="loading-state">
        <div class="spinner"></div>
        Fetching past topics…
      </div>
    </div>
  </div>

  <footer>
    <p>Deep Talks &nbsp;·&nbsp; <a href="index.html">Home</a> &nbsp;·&nbsp; <a href="about.html">About</a></p>
  </footer>

  <script>
    const SHEET_ID = '1QpzZOz48kldrSdk-oZTo5Kws1HR8j83nCgIzDBUFGW8';
    const GID      = '0';
    const FEED_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

    async function loadTopics() {
      const container = document.getElementById('topics-container');
      const countEl   = document.getElementById('topic-count');

      try {
        const res  = await fetch(FEED_URL);
        const text = await res.text();

        // Strip JSONP wrapper
        const json = JSON.parse(
          text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]
        );

        const rows = json.table?.rows || [];

        // Skip the first row (header/label row in the sheet), filter on subject (col E)
        const topics = rows.slice(1).filter(row => {
          const subj = row.c?.[4]?.v ?? row.c?.[4]?.f;
          return subj && String(subj).trim() !== '';
        });

        if (topics.length === 0) {
          container.innerHTML = '<div class="empty-state">No topics recorded yet — check back after the next session.</div>';
          return;
        }

        countEl.textContent = `${topics.length} session${topics.length !== 1 ? 's' : ''} and counting`;

        const html = topics.map((row, i) => {
          const c       = row.c || [];
          const date    = c[1]?.v || c[1]?.f || '';       // col B — prefer raw Date() value
          const host    = c[2]?.v   || '';                 // col C
          const withContent = c[3]?.v || '';              // col D
          const subject = c[4]?.v ?? c[4]?.f ?? '';        // col E
          const summary = c[5]?.v ?? c[5]?.f ?? '';        // col F

          return `
            <div class="topic-row" style="animation-delay:${i * 0.04}s">
              <span class="topic-date">${esc(fmtDate(date))}</span>
              <div class="topic-info">
                <div class="topic-subject">${esc(subject)}</div>
                ${host ? `<div class="topic-host">${esc(host)}${withContent ? `<span style="color:#111"> with ${esc(withContent)}</span>` : ''}</div>` : ''}
              </div>
              <span class="topic-explanation">${esc(summary)}</span>
            </div>`;
        }).join('');

        container.innerHTML = html;

      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="error-state">Couldn't load topics right now — please try again later.</div>`;
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function fmtDate(raw) {
      if (!raw) return '—';
      const str = String(raw).trim();

      // Google Visualization API date format: "Date(2024,0,15)"
      const m = str.match(/Date\((\d+),(\d+),(\d+)\)/);
      if (m) {
        const d = new Date(+m[1], +m[2], +m[3]);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      }

      // Numeric parts: DD/MM/YYYY, MM/DD/YYYY, YYYY-MM-DD, etc.
      const parts = str.split(/[\/\-\.]/);
      if (parts.length === 3 && parts.every(p => /^\d+$/.test(p.trim()))) {
        let [p1, p2, p3] = parts.map(p => +p.trim());
        // YYYY-MM-DD (p1 is a 4-digit year)
        if (p1 > 31) {
          const d = new Date(p1, p2 - 1, p3);
          if (!isNaN(d.getTime())) return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }
        // DD/MM/YYYY (p3 is a 4-digit year, p2 <= 12)
        let year = p3 < 100 ? p3 + 2000 : p3;
        const tryDMY = new Date(year, p2 - 1, p1);
        if (!isNaN(tryDMY.getTime()) && tryDMY.getMonth() === p2 - 1 && tryDMY.getDate() === p1) {
          return tryDMY.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }
        // MM/DD/YYYY fallback
        const tryMDY = new Date(year, p1 - 1, p2);
        if (!isNaN(tryMDY.getTime()) && tryMDY.getMonth() === p1 - 1 && tryMDY.getDate() === p2) {
          return tryMDY.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }
      }

      // Last resort: let the browser parse it (handles ISO, long-form strings, etc.)
      const d = new Date(str);
      if (!isNaN(d.getTime())) {
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      }

      return str; // Return as-is if nothing worked
    }

    loadTopics();
  </script>

</body>
</html>
